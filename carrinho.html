<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PDV Web</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
.header {
  width: 100%;
  height: 20vh;
  background: #9E3667;
  display: flex;
  align-items: center;
  padding: 0 30px;
  gap: 15px;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
}

.header h1 {
  color: white;
  margin: 0;
}

/* MENU */
.menu-btn {
  font-size: 26px;
  color: white;
  cursor: pointer;
}

.side-menu {
  position: fixed;
  top: 20vh;
  left: -250px;
  width: 20%;
  height: calc(100vh - 20vh);
  background: white;
  box-shadow: 2px 0 10px rgba(0,0,0,0.2);
  transition: 0.3s;
  z-index: 4000;
  display: flex;
  flex-direction: column;
}

.side-menu.open { left: 0; }

.menu-item {
  padding: 20px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

/* OVERLAY MENU */
.menu-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.4);
}

.menu-overlay.show { display: block; }

/* PRODUCTS */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
  margin-top: 22vh;
}

.products {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 16px;
}

.product {
  width: 160px;
  height: 240px;
  background: white;
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* CART */
.cart-overlay {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 0;
  background: white;
  overflow: hidden;
  transition: 0.3s;
  z-index: 3000;
  display: flex;
  flex-direction: column;
}

.cart-overlay.open { height: 100vh; }

.cart {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  margin-top: 80px;
}

.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.cart-img-box img {
  width: 50px;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.btn-clear { background: #ff4d6d; color: white; }
.btn-add { background: #2196f3; color: white; }

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  width: 320px;
}

.modal-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.btn-no {
  background: #ccc;
  padding: 10px;
  border: none;
  border-radius: 6px;
}

.btn-yes {
  background: #2ecc71;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="header">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <h1>Venda de Produtos</h1>
</div>

<div class="side-menu" id="sideMenu">
  <div class="menu-item" onclick="logout()">Sair</div>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<div class="container">
  <div class="products" id="products"></div>
</div>

<div class="cart-overlay" id="cartOverlay">
  <div class="cart" id="cart"></div>

  <div class="buttons">
    <button class="btn-clear" onclick="openCancelAll()">Limpar</button>
    <button class="btn-add" onclick="closeCart()">Continuar</button>
  </div>
</div>

<!-- MODAL ITEM -->
<div class="modal" id="modalItem">
  <div class="modal-content">
    <h3>Remover item?</h3>
    <div class="modal-buttons">
      <button class="btn-no" onclick="closeModal('modalItem')">Não</button>
      <button class="btn-yes" onclick="confirmRemoveItem()">Sim</button>
    </div>
  </div>
</div>

<!-- MODAL CANCELAMENTO -->
<div class="modal" id="modalCancel">
  <div class="modal-content">
    <h3>Cancelar transação?</h3>
    <div class="modal-buttons">
      <button class="btn-no" onclick="closeModal('modalCancel')">Não</button>
      <button class="btn-yes" onclick="confirmCancel()">Sim</button>
    </div>
  </div>
</div>

<script>
let cart = {};
let itemToRemove = null;

// ADD ITEM
function addProduct(name) {
  if (!cart[name]) cart[name] = { qty: 1 };
  else cart[name].qty++;

  updateCart();
  document.getElementById('cartOverlay').classList.add('open');
}

// UPDATE CART
function updateCart() {
  const cartDiv = document.getElementById('cart');
  cartDiv.innerHTML = '';

  Object.keys(cart).forEach(name => {
    cartDiv.innerHTML += `
      <div class="cart-item">
        <div>${name} x${cart[name].qty}</div>
        <button onclick="askRemove('${name}')">🗑️</button>
      </div>
    `;
  });
}

// ASK REMOVE ITEM
function askRemove(name) {
  itemToRemove = name;
  document.getElementById('modalItem').style.display = 'flex';
}

// CONFIRM REMOVE ITEM
function confirmRemoveItem() {
  const keys = Object.keys(cart);

  delete cart[itemToRemove];
  closeModal('modalItem');

  // se era o único item → abre cancelamento geral
  if (keys.length === 1) {
    setTimeout(() => {
      openCancelAll();
    }, 300);
  }

  updateCart();
}

// CANCEL ALL
function openCancelAll() {
  document.getElementById('modalCancel').style.display = 'flex';
}

function confirmCancel() {
  cart = {};
  updateCart();
  closeModal('modalCancel');
  closeCart();
}

// CLOSE MODAL
function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// CART
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
}
</script>

</body>
</html>
