<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PDV Web</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      width: 100%;
      height: 20vh;
      background: #9E3667;
      display: flex;
      align-items: center;
      padding-left: 30px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .header h1 {
      color: white;
      margin: 0;
      font-size: 32px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      margin-top: 22vh;
    }

    /* 🔥 6 POR LINHA */
    .products {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }

    .product {
      width: 160px;
      height: 240px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .product-image-box {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .product-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .product-info {
      background: #FFEEF4;
      padding: 12px;
      text-align: center;
      margin-top: auto;
    }

    .product-price {
      font-size: 18px;
      font-weight: bold;
    }

    .product-name {
      font-size: 13px;
      color: #333;
    }

    .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff4d6d;
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
      padding: 15px;
      display: none;
      flex-direction: column;
    }

    .footer.active {
      display: flex;
    }

    .footer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart {
      margin-top: 10px;
      display: none;
    }

    .cart.active {
      display: block;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-clear {
      background: #ff4d6d;
      color: white;
    }

    .btn-add {
      background: #2196f3;
      color: white;
    }

    .btn-options {
      margin-top: 10px;
      background: #9E3667;
      color: white;
      width: 100%;
    }

    .payment {
      display: none;
      text-align: center;
      padding: 100px;
      font-size: 24px;
    }

    .payment.active {
      display: block;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Venda de Produtos</h1>
</div>

<div class="container" id="main">
  <div class="products">

    <!-- PRODUTO 1 -->
    <div class="product" onclick="addProduct('Whey Protein', 100)">
      <div class="product-image-box">
        <img src="D_NQ_NP_877710-MLA99447989168_112025-O.webp" class="product-img">
      </div>
      <div class="product-info">
        <div class="product-price">R$ 100</div>
        <div class="product-name">Whey Protein</div>
      </div>
      <div class="badge" id="badge-Whey Protein"></div>
    </div>

    <!-- PRODUTO 2 -->
    <div class="product" onclick="addProduct('Creatina', 80)">
      <div class="product-image-box">
        <img src="D_NQ_NP_877710-MLA99447989168_112025-O.webp" class="product-img">
      </div>
      <div class="product-info">
        <div class="product-price">R$ 80</div>
        <div class="product-name">Creatina</div>
      </div>
      <div class="badge" id="badge-Creatina"></div>
    </div>

    <!-- PRODUTO 3 -->
    <div class="product" onclick="addProduct('Pré Treino', 70)">
      <div class="product-image-box">
        <img src="D_NQ_NP_877710-MLA99447989168_112025-O.webp" class="product-img">
      </div>
      <div class="product-info">
        <div class="product-price">R$ 70</div>
        <div class="product-name">Pré Treino</div>
      </div>
      <div class="badge" id="badge-Pré Treino"></div>
    </div>

    <!-- PRODUTO 4 -->
    <div class="product" onclick="addProduct('BCAA', 60)">
      <div class="product-image-box">
        <img src="D_NQ_NP_877710-MLA99447989168_112025-O.webp" class="product-img">
      </div>
      <div class="product-info">
        <div class="product-price">R$ 60</div>
        <div class="product-name">BCAA</div>
      </div>
      <div class="badge" id="badge-BCAA"></div>
    </div>

    <!-- PRODUTO 5 -->
    <div class="product" onclick="addProduct('Albumina', 50)">
      <div class="product-image-box">
        <img src="D_NQ_NP_877710-MLA99447989168_112025-O.webp" class="product-img">
      </div>
      <div class="product-info">
        <div class="product-price">R$ 50</div>
        <div class="product-name">Albumina</div>
      </div>
      <div class="badge" id="badge-Albumina"></div>
    </div>

    <!-- PRODUTO 6 -->
    <div class="product" onclick="addProduct('Hipercalórico', 120)">
      <div class="product-image-box">
        <img src="D_NQ_NP_877710-MLA99447989168_112025-O.webp" class="product-img">
      </div>
      <div class="product-info">
        <div class="product-price">R$ 120</div>
        <div class="product-name">Hipercalórico</div>
      </div>
      <div class="badge" id="badge-Hipercalórico"></div>
    </div>

  </div>
</div>

<script>
  let cart = {};

  function addProduct(name, price) {
    if (!cart[name]) cart[name] = { qty: 0, price };
    cart[name].qty++;
    updateUI();
  }

  function updateUI() {
    Object.keys(cart).forEach(name => {
      const badge = document.getElementById('badge-' + name);
      if (badge) {
        badge.style.display = 'flex';
        badge.innerText = cart[name].qty;
      }
    });
  }
</script>

</body>
</html>
