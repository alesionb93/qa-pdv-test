<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PDV Web</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      width: 100%;
      height: 20vh;
      background: #9E3667;
      display: flex;
      align-items: center;
      padding-left: 30px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .header h1 {
      color: white;
      margin: 0;
      font-size: 32px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      margin-top: 22vh;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }

    .product {
      width: 160px;
      height: 240px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .product-image-box {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .product-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .product-info {
      background: #FFEEF4;
      padding: 12px;
      text-align: center;
      margin-top: auto;
    }

    .product-price {
      font-size: 18px;
      font-weight: bold;
    }

    .product-name {
      font-size: 13px;
      color: #333;
    }

    .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff4d6d;
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: white;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 2000;
    }

    /* FULLSCREEN */
    .footer.open {
      height: 100vh;
    }

    .footer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      flex-shrink: 0;
    }

    /* SCROLL AQUI */
    .cart {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-clear {
      background: #ff4d6d;
      color: white;
    }

    .btn-add {
      background: #2196f3;
      color: white;
    }

    .btn-options {
      background: #9E3667;
      color: white;
      width: 100%;
      margin: 10px;
    }

    .payment {
      display: none;
      text-align: center;
      padding: 100px;
      font-size: 24px;
    }

    .payment.active {
      display: block;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Venda de Produtos</h1>
</div>

<div class="container" id="main">
  <div class="products">

    <script>
      const produtos = [
        ["Whey Protein",100],
        ["Creatina",80],
        ["Pré Treino",70],
        ["BCAA",60],
        ["Albumina",50],
        ["Hipercalórico",120],
        ["Barra Proteica",10],
        ["Glutamina",90],
        ["Multivitamínico",40],
        ["Cafeína",30],
        ["Coqueteleira",25],
        ["Termogênico",110]
      ];

      document.write(produtos.map(p => `
        <div class="product" onclick="addProduct('${p[0]}', ${p[1]})">
          <div class="product-image-box">
            <img src="D_NQ_NP_877710-MLA99447989168_112025-O.webp" class="product-img">
          </div>
          <div class="product-info">
            <div class="product-price">R$ ${p[1]}</div>
            <div class="product-name">${p[0]}</div>
          </div>
          <div class="badge" id="badge-${p[0]}"></div>
        </div>
      `).join(''));
    </script>

  </div>
</div>

<div class="footer" id="footer">
  <div class="footer-header">
    <span>Total: R$ <span id="total">0</span></span>
    <button onclick="toggleCart()">⬆️</button>
  </div>

  <div class="cart" id="cart"></div>

  <div class="buttons">
    <button class="btn-clear" onclick="clearCart()">Limpar</button>
    <button class="btn-add" onclick="closeCart()">Adicionar Item</button>
  </div>

  <button class="btn-options" onclick="goToPayment()">+ Opções</button>
</div>

<div class="payment" id="payment">
  Tela de pagamento (em construção 🚧)
</div>

<script>
  let cart = {};

  function addProduct(name, price) {
    if (!cart[name]) cart[name] = { qty: 0, price };
    cart[name].qty++;
    updateUI();
  }

  function updateUI() {
    const footer = document.getElementById('footer');
    const cartDiv = document.getElementById('cart');
    const totalSpan = document.getElementById('total');

    footer.style.display = 'flex';

    cartDiv.innerHTML = '';
    let total = 0;

    Object.keys(cart).forEach(name => {
      const item = cart[name];
      total += item.qty * item.price;

      const badge = document.getElementById('badge-' + name);
      if (badge) {
        badge.style.display = 'flex';
        badge.innerText = item.qty;
      }

      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `${name} x${item.qty} <button onclick="removeItem('${name}')">🗑️</button>`;
      cartDiv.appendChild(div);
    });

    totalSpan.innerText = total;
  }

  function removeItem(name) {
    delete cart[name];
    updateUI();
  }

  function clearCart() {
    cart = {};
    document.getElementById('cart').innerHTML = '';
    document.getElementById('total').innerText = 0;
    document.getElementById('footer').style.display = 'none';
    document.querySelectorAll('.badge').forEach(b => b.style.display = 'none');
  }

  function toggleCart() {
    document.getElementById('footer').classList.toggle('open');
  }

  function closeCart() {
    document.getElementById('footer').classList.remove('open');
  }

  function goToPayment() {
    document.getElementById('main').style.display = 'none';
    document.getElementById('footer').style.display = 'none';
    document.getElementById('payment').classList.add('active');
  }
</script>

</body>
</html>
