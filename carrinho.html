<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PDV Web</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      width: 100%;
      height: 20vh;
      background: #9E3667;
      display: flex;
      align-items: center;
      padding-left: 30px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .header h1 {
      color: white;
      margin: 0;
      font-size: 32px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
      margin-top: 22vh;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
    }

    .product {
      width: 160px;
      height: 240px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .product-image-box {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .product-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .product-info {
      background: #FFEEF4;
      padding: 12px;
      text-align: center;
      margin-top: auto;
    }

    .product-price {
      font-size: 18px;
      font-weight: bold;
    }

    .product-name {
      font-size: 13px;
      color: #333;
    }

    .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff4d6d;
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Venda de Produtos</h1>
</div>

<div class="container">
  <div class="products">

    <!-- LINHA 1 -->

      </div>

        <div class="product-price">R$ 100</div>
        <div class="product-name">Whey Protein</div>
      </div>
      <div class="badge" id="badge-Whey Protein"></div>
    </div>

    </div>

  </div>
</div>

<script>
  let cart = {};

  function addProduct(name, price) {
    if (!cart[name]) cart[name] = { qty: 0, price };
    cart[name].qty++;

    const badge = document.getElementById('badge-' + name);
    if (badge) {
      badge.style.display = 'flex';
      badge.innerText = cart[name].qty;
    }
  }
</script>

</body>
