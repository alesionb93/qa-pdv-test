<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PDV Web</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    /* 🔥 HEADER */
    .header {
      width: 100%;
      height: 20vh;
      background: black;

      display: flex;
      align-items: center;
      justify-content: center;

      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    .header h1 {
      color: #9E3667;
      margin: 0;
      font-size: 32px;
    }

    /* CONTEÚDO */
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;

      margin-top: 22vh; /* empurra abaixo da header */
    }

    h1 {
      display: none; /* remove título duplicado */
    }

    .products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff4d6d;
      color: white;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
      padding: 15px;
      display: none;
      flex-direction: column;
    }

    .footer.active {
      display: flex;
    }

    .footer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart {
      margin-top: 10px;
      display: none;
    }

    .cart.active {
      display: block;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .btn-clear {
      background: #ff4d6d;
      color: white;
    }

    .btn-add {
      background: #2196f3;
      color: white;
    }

    .btn-options {
      margin-top: 10px;
      background: #9E3667;
      color: white;
      width: 100%;
    }

    .payment {
      display: none;
      text-align: center;
      padding: 100px;
      font-size: 24px;
    }

    .payment.active {
      display: block;
    }
  </style>
</head>

<body>

<!-- 🔥 HEADER NOVO -->
<div class="header">
  <h1>Venda de Produtos</h1>
</div>

<div class="container" id="main">

  <div class="products">
    <div class="product" onclick="addProduct('Whey Protein', 100)">
      Whey Protein<br>R$ 100
      <div class="badge" id="badge-Whey Protein"></div>
    </div>
  </div>
</div>

<div class="footer" id="footer">
  <div class="footer-header">
    <span>Total: R$ <span id="total">0</span></span>
    <button onclick="toggleCart()">⬆️</button>
  </div>

  <div class="cart" id="cart"></div>

  <div class="buttons">
    <button class="btn-clear" onclick="clearCart()">Limpar</button>
    <button class="btn-add" onclick="closeCart()">Adicionar Item</button>
  </div>

  <button class="btn-options" onclick="goToPayment()">+ Opções</button>
</div>

<div class="payment" id="payment">
  Tela de pagamento (em construção 🚧)
</div>

<script>
  let cart = {};

  function addProduct(name, price) {
    if (!cart[name]) cart[name] = { qty: 0, price };
    cart[name].qty++;
    updateUI();
  }

  function updateUI() {
    const footer = document.getElementById('footer');
    const cartDiv = document.getElementById('cart');
    const totalSpan = document.getElementById('total');

    footer.classList.add('active');

    cartDiv.innerHTML = '';
    let total = 0;

    Object.keys(cart).forEach(name => {
      const item = cart[name];
      total += item.qty * item.price;

      const badge = document.getElementById('badge-' + name);
      badge.style.display = 'flex';
      badge.innerText = item.qty;

      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `${name} x${item.qty} <button onclick="removeItem('${name}')">🗑️</button>`;
      cartDiv.appendChild(div);
    });

    totalSpan.innerText = total;
  }

  function removeItem(name) {
    delete cart[name];
    updateUI();
  }

  function clearCart() {
    cart = {};
    document.getElementById('cart').innerHTML = '';
    document.getElementById('total').innerText = 0;
    document.getElementById('footer').classList.remove('active');
    document.querySelectorAll('.badge').forEach(b => b.style.display = 'none');
  }

  function toggleCart() {
    document.getElementById('cart').classList.toggle('active');
  }

  function closeCart() {
    document.getElementById('cart').classList.remove('active');
  }

  function goToPayment() {
    document.getElementById('main').style.display = 'none';
    document.getElementById('footer').style.display = 'none';
    document.getElementById('payment').classList.add('active');
  }
</script>

</body>
</html>
