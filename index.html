<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Eyemobile PDV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <img src="Eyemobile_Branco_Simples.png" class="logo">

    <div class="login-box">
      <input 
        type="text" 
        id="username" 
        placeholder="nome do usuário"
        oninput="validateForm()"
      >

      <input 
        type="password" 
        id="password" 
        placeholder="Senha"
        oninput="validateForm()"
      >

      <button 
        id="login-btn" 
        onclick="login()" 
        disabled
      >
        ACESSAR
      </button>
      
      <p id="error-msg" style="color:red; display:none;">
        Senha inválida
      </p>  
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
