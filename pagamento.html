<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

.overlay img {
  display: block;
  margin: 0 auto;
}

.loading {
  width: 80px;
  height: auto;
  margin-bottom: 20px;
}

.qr {
  width: 200px;
  height: auto;
  margin-bottom: 20px;
}

.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
  gap: 10px;
}

.item-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.item-img {
  width: 45px;
  height: 45px;
  object-fit: contain;
  border-radius: 8px;
  background: #fff;
  border: 1px solid #eee;
}

.item-name { font-weight: bold; }
.item-qty { font-size: 12px; color: #666; }

.right {
  flex: 1;
  background: #FFE6EF;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.valor-faltante {
  text-align: center;
  margin-bottom: 20px;
}

.valor {
  font-size: 40px;
  font-weight: bold;
  margin: 10px 0;
}

.btn-desconto {
  background: #2196f3;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-remove {
  margin-left: 10px;
  border-radius: 50%;
  background: red;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #9E3667;
  color: white;
}

.selected {
  outline: 3px solid #000;
}

.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: #FFE6EF;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
}

.footer-left { font-size: 22px; font-weight: bold; }

.finish {
  background: #22B14C;
  color: white;
  padding: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #BD407B;
  color: white;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.box {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  width: 340px;
  border-radius: 14px;
  padding: 18px;
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.option {
  padding: 14px 0;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  justify-items: center;
}

.key {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  border: 2px solid #9E3667;
  background: #f2f2f2;
  cursor: pointer;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn-red { background:#e74c3c; flex:1; padding:12px; border:0; color:#fff; }
.btn-green { background:#2ecc71; flex:1; padding:12px; border:0; color:#fff; }

.auth-input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

.btn-auth {
  width: 100%;
  background: #9E3667;
  color: white;
  padding: 10px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">
  <div>
    <div class="valor-faltante">
      <h2>VALOR FALTANTE</h2>
      <div class="valor">R$ <span id="valorFaltante">0</span></div>

      <div id="descontoArea">
        <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
      </div>
    </div>

    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    SUBTOTAL: R$ <span id="subtotal">0</span><br>
    TOTAL: R$ <span id="total">0</span>
  </div>
  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<!-- overlays originais -->
<div class="overlay" id="cardScreen">
  <img src="loading.gif" class="loading">
  <h1 id="cardMessage">APROXIME, INSIRA OU PASSE O CARTÃO</h1>
</div>

<div class="overlay" id="pixScreen">
  <h1 id="pixMessage">CONSULTANDO PIX</h1>
  <img src="qrcode.avif" class="qr">
</div>

<!-- MODAL DESCONTO -->
<div class="modal" id="modalInput">
  <div class="modal-box">
    <h2 id="display">0</h2>
    <div class="actions">
      <button class="btn-red" onclick="fecharModal()">Cancelar</button>
      <button class="btn-green" onclick="aplicarDesconto()">OK</button>
    </div>
  </div>
</div>

<!-- MODAL AUTORIZAÇÃO -->
<div class="modal" id="modalAuth">
  <div class="modal-box">
    <h3>Autorizar desconto</h3>
    <input class="auth-input" placeholder="Usuário">
    <input class="auth-input" placeholder="Senha" type="password">
    <button class="btn-auth" onclick="autorizar()">Entrar</button>
  </div>
</div>

<!-- MODAL ERRO -->
<div class="modal" id="modalError">
  <div class="modal-box">
    <h3>EYE PRO</h3>
    <p>Valor inválido para desconto</p>
    <button class="btn-auth" onclick="fecharErro()">OK</button>
  </div>
</div>

<script>

const cart = JSON.parse(localStorage.getItem('cart')) || {};
let total = 0;

Object.keys(cart).forEach(n=>{
  total += cart[n].qty * cart[n].price;
  document.getElementById('items').innerHTML += `<div>${n}</div>`;
});

let tipo=null;
let input="";
let desconto=0;
let pending=null;

function baseTotal(){ return total; }

function calcFinal(){
  if(tipo==="percent") return total - (total*desconto/100);
  if(tipo==="valor") return total - desconto;
  return total;
}

function atualizar(){
  const f = calcFinal();
  document.getElementById('subtotal').innerText=total.toFixed(2);
  document.getElementById('total').innerText=f.toFixed(2);
  document.getElementById('valorFaltante').innerText=f.toFixed(2);
}

function abrirTipoDesconto(){
  tipo="percent";
  input="";
  document.getElementById('modalInput').style.display="flex";
}

function fecharModal(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display="none");
}

function aplicarDesconto(){

  let val = parseFloat(input||0);

  if(val<=0){
    document.getElementById('modalError').style.display="flex";
    return;
  }

  if(tipo==="percent" && val>10){
    pending=val;
    document.getElementById('modalAuth').style.display="flex";
    return;
  }

  if(tipo==="valor" && val>10){
    pending=val;
    document.getElementById('modalAuth').style.display="flex";
    return;
  }

  desconto = val;
  fecharModal();
  atualizar();
}

function autorizar(){
  desconto = pending;
  pending=null;
  fecharModal();
  atualizar();
}

function fecharErro(){
  fecharModal();
}

function selectPayment(m,b){
  document.querySelectorAll('.pay-buttons button').forEach(x=>x.classList.remove('selected'));
  b.classList.add('selected');
}

function finalizar(){ alert("OK"); }

atualizar();

</script>

</body>
</html>
