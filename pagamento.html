<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

.overlay img {
  display: block;
  margin: 0 auto;
}

.loading {
  width: 80px;
  height: auto;
  margin-bottom: 20px;
}

.qr {
  width: 200px;
  height: auto;
  margin-bottom: 20px;
}

/* LAYOUT */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.item-left {
  display: flex;
  gap: 10px;
  align-items: center;
}

.item-img {
  width: 45px;
  height: 45px;
  object-fit: contain;
  border-radius: 8px;
  background: #fff;
  border: 1px solid #eee;
}

.right {
  flex: 1;
  background: #FFE6EF;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.valor {
  font-size: 40px;
  font-weight: bold;
}

.btn-desconto {
  background: #2196f3;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  background: #9E3667;
  color: white;
  cursor: pointer;
}

.selected {
  outline: 3px solid #000;
}

.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: #FFE6EF;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 30px;
}

.finish {
  background: #22B14C;
  color: white;
  padding: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* MODAIS */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  width: 360px;
  border-radius: 14px;
  padding: 18px;
  text-align: center;
}

.btn-red, .btn-green {
  padding: 12px;
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.btn-red { background: #e74c3c; }
.btn-green { background: #2ecc71; }

input {
  width: 90%;
  padding: 10px;
  margin: 5px 0;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">

  <div>
    <h2>VALOR FALTANTE</h2>
    <div class="valor">R$ <span id="valorFaltante">0</span></div>

    <div id="descontoArea">
      <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
    </div>

    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>

</div>

<div class="footer">
  <div>
    SUBTOTAL: R$ <span id="subtotal">0</span><br>
    TOTAL: R$ <span id="total">0</span>
  </div>
  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<!-- CARTÃO -->
<div class="overlay" id="cardScreen">
  <img src="loading.gif" class="loading">
  <h1 id="cardMessage">PROCESSANDO...</h1>
  <div class="box">
    <p>💳 Cartão</p>
    <p>Valor: R$ <span id="cardTotal"></span></p>
    <small>Ambiente de teste</small>
  </div>
</div>

<!-- PIX -->
<div class="overlay" id="pixScreen">
  <h1 id="pixMessage">CONSULTANDO PIX</h1>
  <img src="qrcode.avif" class="qr">
  <div class="box">
    <p>PIX</p>
    <p>Valor: R$ <span id="pixTotal"></span></p>
    <small>Ambiente de teste</small>
  </div>
</div>

<!-- ERRO -->
<div class="modal" id="modalErro">
  <div class="modal-box">
    <h2>👁️ EYE PRO</h2>
    <p id="erroMsg"></p>
    <button class="btn-green" onclick="fecharModal()">OK</button>
  </div>
</div>

<!-- AUTH -->
<div class="modal" id="modalAuth">
  <div class="modal-box">
    <h3>Autorizar</h3>
    <p id="authMsg"></p>
    <button class="btn-red" onclick="abrirLogin()">Autorizar</button>
    <button class="btn-green" onclick="fecharModal()">OK</button>
  </div>
</div>

<!-- LOGIN -->
<div class="modal" id="modalLogin">
  <div class="modal-box">
    <h3>Login</h3>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button class="btn-green" onclick="login()">Entrar</button>
  </div>
</div>

<script>

const cart = JSON.parse(localStorage.getItem('cart')) || {};
const serviceFeeEnabled = JSON.parse(localStorage.getItem('serviceFeeEnabled')) || false;

let total = 0;

Object.keys(cart).forEach(i => {
  const item = cart[i];
  total += item.qty * item.price;

  document.getElementById('items').innerHTML += `
    <div class="item">
      <div class="item-left">
        <img src="${item.img}">
        <div>
          <div>${i}</div>
          <div>x${item.qty}</div>
        </div>
      </div>
      <div>R$ ${item.qty * item.price}</div>
    </div>
  `;
});

let desconto = 0;
let tipo = null;
let input = "";

function baseTotal(){
  return serviceFeeEnabled ? total * 1.10 : total;
}

function calcFinal(){
  let base = baseTotal();
  if(tipo === "percent") return base - (base * desconto / 100);
  if(tipo === "valor") return base - desconto;
  return base;
}

function atualizarTotais(){
  const f = calcFinal();
  document.getElementById('subtotal').innerText = total.toFixed(2);
  document.getElementById('total').innerText = f.toFixed(2);
  document.getElementById('valorFaltante').innerText = f.toFixed(2);
  document.getElementById('cardTotal').innerText = f.toFixed(2);
  document.getElementById('pixTotal').innerText = f.toFixed(2);
}

/* ===== VALIDAÇÕES ===== */

function aplicarDesconto(){

  let base = baseTotal();
  let val = tipo === "percent" ? parseFloat(input) : parseFloat(input)/100;

  if(!val || val <= 0){
    return showError("Valor de desconto inválido");
  }

  if(tipo === "percent" && val > 10){
    return showAuth("Limite de 10% atingido");
  }

  if(tipo === "valor" && val > base * 0.10){
    return showAuth("Limite de R$ " + (base * 0.10).toFixed(2));
  }

  if(val > base){
    return showError("Valor inválido para desconto");
  }

  desconto = val;
  fecharModal();
  atualizarTotais();
}

function showError(msg){
  document.getElementById('erroMsg').innerText = msg;
  document.getElementById('modalErro').style.display="flex";
}

function showAuth(msg){
  document.getElementById('authMsg').innerText = msg;
  document.getElementById('modalAuth').style.display="flex";
}

function abrirLogin(){
  document.getElementById('modalAuth').style.display="none";
  document.getElementById('modalLogin').style.display="flex";
}

function login(){
  document.getElementById('modalLogin').style.display="none";
  fecharModal();
}

function fecharModal(){
  document.querySelectorAll('.modal').forEach(m => m.style.display="none");
}

function selectPayment(m,b){
  document.querySelectorAll('.pay-buttons button').forEach(x=>x.classList.remove('selected'));
  b.classList.add('selected');
}

function finalizar(){
  alert("OK");
}

atualizarTotais();

</script>

</body>
</html>
