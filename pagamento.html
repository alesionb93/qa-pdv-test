<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

/* LAYOUT */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.right {
  flex: 1;
  background: #fafafa;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.total {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn-cash { background: #4caf50; color: white; }
.btn-card { background: #2196f3; color: white; }
.btn-pix { background: #9c27b0; color: white; }

.selected {
  outline: 3px solid #000;
}

.finish {
  background: #9E3667;
  color: white;
  padding: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* TELAS FULL */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #BD407B;
  color: white;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.box {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

.loading {
  width: 80px;
  margin-bottom: 20px;
}

.qr {
  width: 200px;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">
  <div>
    <div class="total">
      Total: R$ <span id="total">0</span>
    </div>

    <div class="pay-buttons">
      <button class="btn-cash" onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button class="btn-card" onclick="selectPayment('Cartao', this)">Cartão</button>
      <button class="btn-pix" onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>

  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<!-- 💳 CARTÃO -->
<div class="overlay" id="cardScreen">
  <img src="loading.gif" class="loading">
  <h1 id="cardMessage">APROXIME, INSIRA OU PASSE O CARTÃO</h1>

  <div class="box">
    <p>💳 Cartão</p>
    <p>Valor: R$ <span id="cardTotal"></span></p>
    <small>Ambiente de teste</small>
  </div>
</div>

<!-- 📲 PIX -->
<div class="overlay" id="pixScreen">
  <h1 id="pixMessage">CONSULTANDO STATUS DA TRANSAÇÃO VIA PIX</h1>

  <img src="qrcode.avif" class="qr">

  <div class="box">
    <p>📲 PIX</p>
    <p>Valor: R$ <span id="pixTotal"></span></p>
    <small>Ambiente de teste</small>
  </div>
</div>

<script>
const cart = JSON.parse(localStorage.getItem('cart')) || {};
const itemsDiv = document.getElementById('items');
const totalSpan = document.getElementById('total');
const cardTotal = document.getElementById('cardTotal');
const pixTotal = document.getElementById('pixTotal');

let total = 0;

Object.keys(cart).forEach(name => {
  const item = cart[name];
  const itemTotal = item.qty * item.price;
  total += itemTotal;

  itemsDiv.innerHTML += `
    <div class="item">
      <div>${name} x${item.qty}</div>
      <div>R$ ${itemTotal}</div>
    </div>
  `;
});

totalSpan.innerText = total;
cardTotal.innerText = total;
pixTotal.innerText = total;

// seleção
let paymentMethod = null;

function selectPayment(method, btn) {
  paymentMethod = method;

  document.querySelectorAll('.pay-buttons button').forEach(b => {
    b.classList.remove('selected');
  });

  btn.classList.add('selected');
}

// finalizar
function finalizar() {
  if (!paymentMethod) {
    alert("Selecione uma forma de pagamento!");
    return;
  }

  if (paymentMethod === "Cartao") {
    simularCartao();
  } else if (paymentMethod === "PIX") {
    simularPix();
  } else {
    alert("Pagamento em dinheiro recebido");
    finalizarVenda();
  }
}

// 💳 CARTÃO
function simularCartao() {
  const screen = document.getElementById('cardScreen');
  const msg = document.getElementById('cardMessage');

  screen.style.display = "flex";

  setTimeout(() => msg.innerText = "PROCESSANDO...", 2000);
  setTimeout(() => msg.innerText = "DÉBITO NUBANK", 4000);
  setTimeout(() => msg.innerText = "PROCESSANDO...", 6000);
  setTimeout(() => msg.innerText = "TRANSAÇÃO APROVADA ✅", 8000);
  setTimeout(finalizarVenda, 10000);
}

// 📲 PIX
function simularPix() {
  const screen = document.getElementById('pixScreen');
  const msg = document.getElementById('pixMessage');

  screen.style.display = "flex";

  setTimeout(() => {
    msg.innerText = "TRANSAÇÃO APROVADA ✅";
  }, 5000);

  setTimeout(finalizarVenda, 7000);
}

// FINAL
function finalizarVenda() {
  localStorage.removeItem('cart');
  window.location.href = "index.html";
}
</script>

</body>
</html>
