<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

/* LAYOUT */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.item-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.item-img {
  width: 45px;
  height: 45px;
}

/* RIGHT */
.right {
  flex: 1;
  background: #FFE6EF;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* VALOR */
.valor-faltante {
  text-align: center;
}

.valor {
  font-size: 40px;
  font-weight: bold;
}

/* BOTÃO DESCONTO */
.btn-desconto {
  background: #2196f3;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

.btn-remove {
  margin-left: 10px;
  border-radius: 50%;
  background: red;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

/* PAGAMENTOS */
.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  background: #9E3667;
  color: white;
  border: none;
  border-radius: 8px;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #FFE6EF;
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

.finish {
  background: #22B14C;
  color: white;
  padding: 15px;
  border: none;
  border-radius: 10px;
}

/* MODAL */
.modal {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}

.keypad button {
  width:60px;
  height:50px;
  margin:5px;
}

.red {background:red;color:white;}
.green {background:green;color:white;}

</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">
  <div>

    <div class="valor-faltante">
      <h2>VALOR FALTANTE</h2>
      <div class="valor">R$ <span id="valorFaltante">0</span></div>

      <div id="descontoArea">
        <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
      </div>
    </div>

    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>
</div>

<div class="footer">
  <div>
    SUBTOTAL: R$ <span id="subtotal">0</span><br>
    TOTAL: R$ <span id="total">0</span>
  </div>

  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<!-- MODAL TIPO -->
<div class="modal" id="modalTipo">
  <div class="modal-box">
    <h3>Tipo de desconto</h3>
    <button onclick="abrirInput('percent')">(%) Percentual</button>
    <button onclick="abrirInput('valor')">(R$) Valor</button>
    <br><br>
    <button onclick="fecharModal()">X</button>
  </div>
</div>

<!-- MODAL INPUT -->
<div class="modal" id="modalInput">
  <div class="modal-box">
    <h2 id="display">0</h2>
    <p id="label"></p>

    <div class="keypad">
      <button onclick="dig(1)">1</button>
      <button onclick="dig(2)">2</button>
      <button onclick="dig(3)">3</button><br>
      <button onclick="dig(4)">4</button>
      <button onclick="dig(5)">5</button>
      <button onclick="dig(6)">6</button><br>
      <button onclick="dig(7)">7</button>
      <button onclick="dig(8)">8</button>
      <button onclick="dig(9)">9</button><br>
      <button onclick="clearInput()">LIMPAR</button>
      <button onclick="dig(0)">0</button>
      <button onclick="del()">X</button>
    </div>

    <br>
    <button class="red" onclick="fecharModal()">Cancelar</button>
    <button class="green" onclick="aplicarDesconto()">Avançar</button>
  </div>
</div>

<script>

const cart = JSON.parse(localStorage.getItem('cart')) || {};
const serviceFeeEnabled = JSON.parse(localStorage.getItem('serviceFeeEnabled')) || false;

const subtotalSpan = document.getElementById('subtotal');
const totalSpan = document.getElementById('total');
const valorFaltanteSpan = document.getElementById('valorFaltante');

let total = 0;

Object.keys(cart).forEach(name => {
  const item = cart[name];
  total += item.qty * item.price;
});

// BASE
let desconto = 0;
let tipo = null;
let input = "";

// TOTAL COM TAXA
function calcularTotalBase(){
  return serviceFeeEnabled ? total * 1.10 : total;
}

function atualizarTotais(){
  let base = calcularTotalBase();

  let final = base;

  if(tipo === "percent"){
    final = base - (base * desconto / 100);
  } else if(tipo === "valor"){
    final = base - desconto;
  }

  subtotalSpan.innerText = total.toFixed(2);
  totalSpan.innerText = final.toFixed(2);
  valorFaltanteSpan.innerText = final.toFixed(2);
}

// MODAIS
function abrirTipoDesconto(){
  document.getElementById('modalTipo').style.display="flex";
}

function abrirInput(t){
  tipo = t;
  input = "";
  document.getElementById('modalTipo').style.display="none";
  document.getElementById('modalInput').style.display="flex";

  document.getElementById('label').innerText =
    t==="percent" ? "PERCENTUAL (%)" : "VALOR (R$)";
}

function fecharModal(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display="none");
}

// INPUT
function dig(n){
  input += n;
  atualizarDisplay();
}

function del(){
  input = input.slice(0,-1);
  atualizarDisplay();
}

function clearInput(){
  input="";
  atualizarDisplay();
}

function atualizarDisplay(){
  let val = input || "0";

  if(tipo==="percent"){
    document.getElementById('display').innerText = val + "%";
  }else{
    document.getElementById('display').innerText = "R$ " + (parseFloat(val)/100).toFixed(2);
  }
}

// APLICAR
function aplicarDesconto(){
  if(!input) return;

  if(tipo==="percent"){
    desconto = parseFloat(input);
  }else{
    desconto = parseFloat(input)/100;
  }

  fecharModal();
  atualizarTotais();
  renderDescontoUI();
}

// UI DESCONTO
function renderDescontoUI(){
  const area = document.getElementById('descontoArea');

  let txt = tipo==="percent"
    ? `DESCONTO ${desconto}%`
    : `DESCONTO R$ ${desconto.toFixed(2)}`;

  area.innerHTML = `
    <button class="btn-desconto" disabled>${txt}</button>
    <button class="btn-remove" onclick="removerDesconto()">X</button>
  `;
}

function removerDesconto(){
  desconto=0;
  tipo=null;
  document.getElementById('descontoArea').innerHTML =
    `<button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>`;
  atualizarTotais();
}

// INIT
atualizarTotais();

</script>

</body>
</html>
