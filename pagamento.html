<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

/* ================= LAYOUT ================= */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.item-left {
  display: flex;
  gap: 10px;
}

.item-img {
  width: 45px;
  height: 45px;
  border-radius: 8px;
  border: 1px solid #eee;
}

.item-name { font-weight: bold; }
.item-qty { font-size: 12px; color: #666; }

/* ================= RIGHT ================= */
.right {
  flex: 1;
  background: #FFE6EF;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.valor {
  font-size: 40px;
  font-weight: bold;
}

/* desconto */
.btn-desconto {
  background: #2196f3;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-remove {
  margin-left: 10px;
  border-radius: 50%;
  background: red;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
}

/* pagamentos */
.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #9E3667;
  color: white;
}

.selected {
  outline: 3px solid #000;
}

/* ================= FOOTER ================= */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: #FFE6EF;
  display: flex;
  justify-content: space-between;
  padding: 0 30px;
}

.footer-left {
  font-size: 22px;
  font-weight: bold;
}

.finish {
  background: #22B14C;
  color: white;
  padding: 18px;
  border: none;
  border-radius: 10px;
}

/* ================= MODAL DESCONTO ================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  width: 340px;
  border-radius: 14px;
  padding: 18px;
  position: relative;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
  margin-bottom: 10px;
}

.option {
  padding: 14px 0;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

/* ================= KEYPAD ================= */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  justify-items: center;
}

.key {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  border: 2px solid #9E3667;
  background: #f2f2f2;
}

/* actions */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn-red { background: #e74c3c; color: white; flex:1; border:none; padding:12px; border-radius:10px;}
.btn-green { background: #2ecc71; color: white; flex:1; border:none; padding:12px; border-radius:10px;}

/* ================= OVERLAYS (IMPORTANTE RESTAURADO) ================= */
.overlay {
  position: fixed;
  inset: 0;
  background: #BD407B;
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.box {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">

  <div>
    <div class="valor">
      R$ <span id="valorFaltante">0</span>
    </div>

    <div id="descontoArea">
      <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
    </div>

    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>

</div>

<div class="footer">
  <div class="footer-left">
    TOTAL: R$ <span id="total">0</span>
  </div>

  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<!-- CARTÃO -->
<div class="overlay" id="cardScreen">
  <h1 id="cardMessage">APROXIME O CARTÃO</h1>
</div>

<!-- PIX -->
<div class="overlay" id="pixScreen">
  <h1 id="pixMessage">PIX EM PROCESSAMENTO</h1>
</div>

<!-- MODAL DESCONTO -->
<div class="modal" id="modalTipo">
  <div class="modal-box">
    <div class="modal-header">
      Tipo de desconto
      <span onclick="fecharModal()">✕</span>
    </div>

    <div class="option" onclick="abrirInput('percent')">(%) Percentual</div>
    <div class="option" onclick="abrirInput('valor')">(R$) Valor</div>
  </div>
</div>

<!-- MODAL INPUT -->
<div class="modal" id="modalInput">
  <div class="modal-box">

    <h2 id="display">0</h2>
    <p id="label"></p>

    <div class="keypad">
      <button class="key" onclick="dig(1)">1</button>
      <button class="key" onclick="dig(2)">2</button>
      <button class="key" onclick="dig(3)">3</button>
      <button class="key" onclick="dig(4)">4</button>
      <button class="key" onclick="dig(5)">5</button>
      <button class="key" onclick="dig(6)">6</button>
      <button class="key" onclick="dig(7)">7</button>
      <button class="key" onclick="dig(8)">8</button>
      <button class="key" onclick="dig(9)">9</button>
      <button class="key" onclick="clearInput()">C</button>
      <button class="key" onclick="dig(0)">0</button>
      <button class="key" onclick="del()">⌫</button>
    </div>

    <div class="actions">
      <button class="btn-red" onclick="fecharModal()">Cancelar</button>
      <button class="btn-green" onclick="aplicarDesconto()">Avançar</button>
    </div>

  </div>
</div>

<script>

/* ================= CART ================= */
const cart = JSON.parse(localStorage.getItem('cart')) || {};

let total = 0;

Object.keys(cart).forEach(name => {
  const item = cart[name];
  total += item.qty * item.price;
  document.getElementById('items').innerHTML += `
    <div class="item">
      <div>${name}</div>
      <div>R$ ${item.qty * item.price}</div>
    </div>
  `;
});

/* ================= DESCONTO ================= */
let desconto = 0;
let tipo = null;
let input = "";

function calcFinal(){
  if(tipo === "percent") return total - (total * desconto / 100);
  if(tipo === "valor") return total - desconto;
  return total;
}

function atualizarTotais(){
  const final = calcFinal();
  document.getElementById('total').innerText = final.toFixed(2);
  document.getElementById('valorFaltante').innerText = final.toFixed(2);
}

/* ================= PAGAMENTO (RESTAURADO) ================= */
let paymentMethod = null;

function selectPayment(method, btn){
  paymentMethod = method;
  document.querySelectorAll('.pay-buttons button').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function finalizar(){

  if(!paymentMethod){
    alert("Selecione pagamento");
    return;
  }

  if(paymentMethod === "Cartao"){
    simularCartao();
  }

  else if(paymentMethod === "PIX"){
    simularPix();
  }

  else {
    alert("Pagamento em dinheiro recebido");
    window.location.href = "carrinho.html";
  }
}

/* ================= FLUXOS RESTAURADOS ================= */
function simularCartao(){
  const screen = document.getElementById("cardScreen");
  const msg = document.getElementById("cardMessage");

  screen.style.display = "flex";

  setTimeout(()=>msg.innerText="PROCESSANDO...",2000);
  setTimeout(()=>msg.innerText="APROVADO ✔",6000);
  setTimeout(()=>window.location.href="carrinho.html",9000);
}

function simularPix(){
  const screen = document.getElementById("pixScreen");
  const msg = document.getElementById("pixMessage");

  screen.style.display = "flex";

  setTimeout(()=>msg.innerText="PIX CONFIRMADO ✔",5000);
  setTimeout(()=>window.location.href="carrinho.html",8000);
}

/* ================= MODAL ================= */
function abrirTipoDesconto(){
  document.getElementById("modalTipo").style.display="flex";
}

function abrirInput(t){
  tipo = t;
  input = "";
  fecharModal();
  document.getElementById("modalInput").style.display="flex";
}

function fecharModal(){
  document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
}

/* keypad */
function dig(n){ input+=n; atualizarDisplay(); }
function del(){ input=input.slice(0,-1); atualizarDisplay(); }
function clearInput(){ input=""; atualizarDisplay(); }

function atualizarDisplay(){
  document.getElementById("display").innerText =
    tipo==="percent" ? input+"%" : "R$ "+(input/100||0).toFixed(2);
}

function aplicarDesconto(){
  desconto = tipo==="percent" ? parseFloat(input) : parseFloat(input)/100;
  fecharModal();
  atualizarTotais();
}

atualizarTotais();

</script>

</body>
</html>
