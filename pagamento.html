<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.item-left {
  display: flex;
  gap: 10px;
  align-items: center;
}

.item-img {
  width: 45px;
  height: 45px;
  border-radius: 8px;
  border: 1px solid #eee;
}

.item-name { font-weight: bold; }
.item-qty { font-size: 12px; color: #666; }

/* RIGHT */
.right {
  flex: 1;
  background: #FFE6EF;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.valor {
  font-size: 40px;
  font-weight: bold;
}

.btn-desconto {
  background: #2196f3;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-remove {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: red;
  color: white;
}

/* PAYMENT */
.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  background: #9E3667;
  color: white;
  cursor: pointer;
}

.selected { outline: 3px solid #000; }

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: #FFE6EF;
  display: flex;
  justify-content: space-between;
  padding: 0 30px;
  align-items: center;
}

.finish {
  background: #22B14C;
  border: none;
  color: white;
  padding: 18px;
  border-radius: 10px;
}

/* OVERLAYS (DINHEIRO / CARTÃO / PIX) */
.overlay {
  position: fixed;
  inset: 0;
  background: #BD407B;
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.box {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

.loading { width: 80px; }
.qr { width: 200px; }

/* MODAL TIPO */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  width: 340px;
  border-radius: 14px;
  padding: 18px;
}

.option {
  padding: 14px 0;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

/* KEYPAD */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  justify-items: center;
}

.key {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  border: 2px solid #9E3667;
  background: #f2f2f2;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.btn-red {
  flex: 1;
  background: #e74c3c;
  border: none;
  color: white;
  border-radius: 12px;
  padding: 12px;
}

.btn-green {
  flex: 1;
  background: #2ecc71;
  border: none;
  color: white;
  border-radius: 12px;
  padding: 12px;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">

  <div>
    <div class="valor">
      R$ <span id="valorFaltante">0</span>
    </div>

    <div id="descontoArea">
      <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
    </div>

    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>

</div>

<div class="footer">
  <div>
    SUBTOTAL: R$ <span id="subtotal">0</span><br>
    TOTAL: R$ <span id="total">0</span>
  </div>

  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<!-- CARTÃO -->
<div class="overlay" id="cardScreen">
  <img src="loading.gif" class="loading">
  <h1 id="cardMessage">APROXIME O CARTÃO</h1>
  <div class="box">
    <p>Cartão</p>
    <p>R$ <span id="cardTotal"></span></p>
  </div>
</div>

<!-- PIX -->
<div class="overlay" id="pixScreen">
  <h1 id="pixMessage">GERANDO PIX</h1>
  <img src="qrcode.avif" class="qr">
  <div class="box">
    <p>PIX</p>
    <p>R$ <span id="pixTotal"></span></p>
  </div>
</div>

<!-- MODAL DESCONTO -->
<div class="modal" id="modalTipo">
  <div class="modal-box">
    <div class="option" onclick="abrirInput('percent')">Percentual (%)</div>
    <div class="option" onclick="abrirInput('valor')">Valor (R$)</div>
  </div>
</div>

<!-- MODAL INPUT -->
<div class="modal" id="modalInput">
  <div class="modal-box">

    <h2 id="display">0</h2>
    <p id="label"></p>

    <div class="keypad">
      <button class="key" onclick="dig(1)">1</button>
      <button class="key" onclick="dig(2)">2</button>
      <button class="key" onclick="dig(3)">3</button>
      <button class="key" onclick="dig(4)">4</button>
      <button class="key" onclick="dig(5)">5</button>
      <button class="key" onclick="dig(6)">6</button>
      <button class="key" onclick="dig(7)">7</button>
      <button class="key" onclick="dig(8)">8</button>
      <button class="key" onclick="dig(9)">9</button>
      <button class="key" onclick="clearInput()">C</button>
      <button class="key" onclick="dig(0)">0</button>
      <button class="key" onclick="del()">⌫</button>
    </div>

    <div class="actions">
      <button class="btn-red" onclick="fecharModal()">Cancelar</button>
      <button class="btn-green" onclick="aplicarDesconto()">Avançar</button>
    </div>

  </div>
</div>

<script>

/* CART */
const cart = JSON.parse(localStorage.getItem('cart')) || {};
let total = 0;

Object.keys(cart).forEach(name => {
  const item = cart[name];
  const itemTotal = item.qty * item.price;
  total += itemTotal;

  document.getElementById('items').innerHTML += `
    <div class="item">
      <div class="item-left">
        <img class="item-img" src="${item.img}">
        <div>
          <div class="item-name">${name}</div>
          <div class="item-qty">x${item.qty}</div>
        </div>
      </div>
      <div>R$ ${itemTotal}</div>
    </div>
  `;
});

function atualizarTotais() {
  document.getElementById('subtotal').innerText = total.toFixed(2);
  document.getElementById('total').innerText = total.toFixed(2);
  document.getElementById('valorFaltante').innerText = total.toFixed(2);
  document.getElementById('cardTotal').innerText = total.toFixed(2);
  document.getElementById('pixTotal').innerText = total.toFixed(2);
}

atualizarTotais();

/* PAYMENT */
let paymentMethod = null;

function selectPayment(m, btn) {
  paymentMethod = m;
  document.querySelectorAll('.pay-buttons button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

/* 🔥 RESTAURADO FLUXO ORIGINAL */
function finalizar() {
  if (!paymentMethod) return alert("Selecione pagamento");

  if (paymentMethod === "Cartao") simularCartao();
  else if (paymentMethod === "PIX") simularPix();
  else simularDinheiro();
}

function simularDinheiro() {
  finalizarVenda();
}

function simularCartao() {
  const s = document.getElementById('cardScreen');
  const m = document.getElementById('cardMessage');

  s.style.display = "flex";

  setTimeout(() => m.innerText = "PROCESSANDO...", 2000);
  setTimeout(() => m.innerText = "APROVADO ✅", 7000);
  setTimeout(finalizarVenda, 9000);
}

function simularPix() {
  const s = document.getElementById('pixScreen');
  const m = document.getElementById('pixMessage');

  s.style.display = "flex";

  setTimeout(() => m.innerText = "TRANSAÇÃO APROVADA ✅", 5000);
  setTimeout(finalizarVenda, 7000);
}

function finalizarVenda() {
  localStorage.removeItem('cart');
  window.location.href = "carrinho.html";
}

/* MODAIS */
function abrirTipoDesconto() {
  document.getElementById('modalTipo').style.display = "flex";
}

function abrirInput(t) {
  document.getElementById('modalTipo').style.display = "none";
  document.getElementById('modalInput').style.display = "flex";
}

function fecharModal() {
  document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
}

/* desconto simples (mantido leve) */
let input = "";
function dig(n){ input += n; }
function del(){ input = input.slice(0,-1); }
function clearInput(){ input = ""; }

function aplicarDesconto(){
  fecharModal();
}

</script>

</body>
</html>
