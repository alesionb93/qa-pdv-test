<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

/* LAYOUT */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
  gap: 10px;
}

.item-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.item-img {
  width: 45px;
  height: 45px;
  object-fit: contain;
  border-radius: 8px;
  background: #fff;
  border: 1px solid #eee;
}

.item-name { font-weight: bold; }
.item-qty { font-size: 12px; color: #666; }

/* RIGHT */
.right {
  flex: 1;
  background: #FFE6EF;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* VALOR */
.valor-faltante {
  text-align: center;
  margin-bottom: 20px;
}

.valor {
  font-size: 40px;
  font-weight: bold;
  margin: 10px 0;
}

/* DESCONTO BOTÃO */
.btn-desconto {
  background: #2196f3;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.btn-remove {
  margin-left: 10px;
  border-radius: 50%;
  background: red;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

/* PAGAMENTO */
.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #9E3667;
  color: white;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: #FFE6EF;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
}

.footer-left { font-size: 22px; font-weight: bold; }
.footer-right { width: 300px; }

.finish {
  background: #22B14C;
  color: white;
  padding: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* ================= MODAL TIPO ================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  width: 320px;
  border-radius: 14px;
  padding: 18px;
  position: relative;
}

.modal-title {
  font-weight: bold;
  margin-bottom: 12px;
  font-size: 16px;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 12px;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  color: #666;
}

/* lista estilo clean */
.option {
  padding: 12px 0;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  transition: 0.2s;
}

.option:hover {
  background: #f7f7f7;
}

/* ================= KEYPAD ================= */
.keypad {
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.key {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: #f2f2f2;
  font-size: 18px;
  cursor: pointer;
}

.key:hover {
  background: #e6e6e6;
}

/* ações */
.action-row {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  gap: 10px;
}

.btn-red, .btn-green {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.btn-red { background: #e74c3c; }
.btn-green { background: #2ecc71; }

.action-mini {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  gap: 10px;
}

.small-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #ddd;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">
  <div>

    <div class="valor-faltante">
      <h2>VALOR FALTANTE</h2>
      <div class="valor">R$ <span id="valorFaltante">0</span></div>

      <div id="descontoArea">
        <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
      </div>
    </div>

    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    SUBTOTAL: R$ <span id="subtotal">0</span><br>
    TOTAL: R$ <span id="total">0</span>
  </div>
  <div class="footer-right">
    <button class="finish" onclick="finalizar()">Finalizar Venda</button>
  </div>
</div>

<!-- MODAL TIPO -->
<div class="modal" id="modalTipo">
  <div class="modal-box">

    <div class="modal-title">Tipo de desconto</div>
    <div class="modal-close" onclick="fecharModal()">✕</div>

    <div class="option" onclick="abrirInput('percent')">(%) Percentual</div>
    <div class="option" onclick="abrirInput('valor')">(R$) Valor</div>

  </div>
</div>

<!-- MODAL INPUT -->
<div class="modal" id="modalInput">
  <div class="modal-box">

    <div class="modal-close" onclick="fecharModal()">✕</div>

    <h2 id="display">0</h2>
    <p id="label"></p>

    <div class="keypad">
      <button class="key" onclick="dig(1)">1</button>
      <button class="key" onclick="dig(2)">2</button>
      <button class="key" onclick="dig(3)">3</button>
      <button class="key" onclick="dig(4)">4</button>
      <button class="key" onclick="dig(5)">5</button>
      <button class="key" onclick="dig(6)">6</button>
      <button class="key" onclick="dig(7)">7</button>
      <button class="key" onclick="dig(8)">8</button>
      <button class="key" onclick="dig(9)">9</button>
      <button class="key" onclick="clearInput()">C</button>
      <button class="key" onclick="dig(0)">0</button>
      <button class="key" onclick="del()">⌫</button>
    </div>

    <div class="action-mini">
      <button class="small-btn btn-red" onclick="fecharModal()">Cancelar</button>
      <button class="small-btn btn-green" onclick="aplicarDesconto()">Avançar</button>
    </div>

  </div>
</div>

<script>

/* ================= LOGICA (INALTERADA) ================= */

const cart = JSON.parse(localStorage.getItem('cart')) || {};
const serviceFeeEnabled = JSON.parse(localStorage.getItem('serviceFeeEnabled')) || false;

const itemsDiv = document.getElementById('items');
const subtotalSpan = document.getElementById('subtotal');
const totalSpan = document.getElementById('total');
const valorFaltanteSpan = document.getElementById('valorFaltante');

let total = 0;

Object.keys(cart).forEach(name => {
  const item = cart[name];
  const itemTotal = item.qty * item.price;
  total += itemTotal;

  itemsDiv.innerHTML += `
    <div class="item">
      <div class="item-left">
        <img src="${item.img}" class="item-img">
        <div>
          <div class="item-name">${name}</div>
          <div class="item-qty">x${item.qty}</div>
        </div>
      </div>
      <div>R$ ${itemTotal}</div>
    </div>
  `;
});

/* DESCONTO */
let desconto = 0;
let tipo = null;
let input = "";

function baseTotal(){
  return serviceFeeEnabled ? total * 1.10 : total;
}

function calcFinal(){
  let base = baseTotal();

  if(tipo === "percent") return base - (base * desconto / 100);
  if(tipo === "valor") return base - desconto;

  return base;
}

function atualizarTotais(){
  const final = calcFinal();

  subtotalSpan.innerText = total.toFixed(2);
  totalSpan.innerText = final.toFixed(2);
  valorFaltanteSpan.innerText = final.toFixed(2);
}

/* pagamento (mantido) */
let paymentMethod = null;

function selectPayment(m,b){
  paymentMethod = m;
  document.querySelectorAll('.pay-buttons button').forEach(x=>x.classList.remove('selected'));
  b.classList.add('selected');
}

function finalizar(){
  alert("Finalizar pagamento");
}

/* MODAIS */
function abrirTipoDesconto(){
  document.getElementById('modalTipo').style.display='flex';
}

function abrirInput(t){
  tipo = t;
  input = "";
  document.getElementById('modalTipo').style.display='none';
  document.getElementById('modalInput').style.display='flex';
}

function fecharModal(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
}

/* keypad */
function dig(n){ input+=n; atualizarDisplay(); }
function del(){ input=input.slice(0,-1); atualizarDisplay(); }
function clearInput(){ input=""; atualizarDisplay(); }

function atualizarDisplay(){
  document.getElementById('display').innerText =
    tipo==="percent" ? input+"%" : "R$ "+(input/100||0).toFixed(2);
}

function aplicarDesconto(){
  desconto = tipo==="percent" ? parseFloat(input) : parseFloat(input)/100;

  fecharModal();
  atualizarTotais();

  document.getElementById('descontoArea').innerHTML = `
    <button class="btn-desconto" disabled>DESCONTO APLICADO</button>
    <button class="btn-remove" onclick="removerDesconto()">✕</button>
  `;
}

function removerDesconto(){
  desconto=0;
  tipo=null;
  input="";

  document.getElementById('descontoArea').innerHTML =
    `<button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>`;

  atualizarTotais();
}

atualizarTotais();

</script>

</body>
</html>
