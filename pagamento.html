<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}
.left { flex: 2; background: white; padding: 20px; overflow-y: auto; }
.item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; border-bottom: 1px solid #eee; gap: 10px;
}
.item-left { display: flex; align-items: center; gap: 10px; }
.item-img {
  width: 45px; height: 45px; object-fit: contain;
  border-radius: 8px; background: #fff; border: 1px solid #eee;
}
.item-name { font-weight: bold; }
.item-qty { font-size: 12px; color: #666; }
.right { flex: 1; background: #FFE6EF; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
.valor-faltante { text-align: center; margin-bottom: 20px; }
.valor { font-size: 40px; font-weight: bold; margin: 10px 0; }
.btn-desconto {
  background: #2196f3; color: white; border: none;
  padding: 10px 20px; border-radius: 8px; cursor: pointer;
}
.btn-remove {
  margin-left: 10px; border-radius: 50%; background: red;
  color: white; border: none; width: 30px; height: 30px; cursor: pointer;
}
.pay-buttons button {
  width: 100%; padding: 15px; margin-bottom: 10px;
  border: none; border-radius: 8px; cursor: pointer;
  background: #9E3667; color: white;
}
.selected { outline: 3px solid #000; }
.footer {
  position: fixed; bottom: 0; left: 0; right: 0; height: 100px;
  background: #FFE6EF; display: flex; align-items: center;
  justify-content: space-between; padding: 0 30px;
}
.footer-left { font-size: 22px; font-weight: bold; }
.finish {
  background: #22B14C; color: white; padding: 18px;
  border: none; border-radius: 10px; cursor: pointer;
}
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #BD407B; color: white; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
}
.loading { width: 80px; height: auto; margin-bottom: 20px; }
.qr { width: 200px; height: auto; margin-bottom: 20px; }
.box { background: rgba(255,255,255,0.2); padding: 20px; border-radius: 12px; margin-top: 20px; }

/* Modais */
.modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.modal-box {
  background: white; width: 340px; border-radius: 14px;
  padding: 18px; position: relative;
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px; font-weight: bold;
}
.modal-close { cursor: pointer; font-size: 18px; color: #666; }
.option { padding: 14px 0; border-bottom: 1px solid #eee; cursor: pointer; }

/* Keypad */
#display { text-align: center; font-size: 34px; margin: 10px 0 0; }
#label { text-align: center; margin-bottom: 15px; color: #666; }
.keypad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; justify-items: center; margin-top: 10px;
}
.key {
  width: 62px; height: 62px; border-radius: 50%;
  border: 2px solid #9E3667; background: #f2f2f2;
  font-size: 18px; cursor: pointer;
}
.actions {
  display: flex; gap: 10px; margin-top: 15px;
}
.btn-red, .btn-green {
  flex: 1; padding: 12px; border: none; border-radius: 12px;
  color: white; font-weight: bold; cursor: pointer;
}
.btn-red { background: #e74c3c; }
.btn-green { background: #2ecc71; }

/* Modal de Limite de Desconto */
#errorModal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center;
  z-index: 2000;
}
#errorBox {
  background: white; width: 340px; border-radius: 16px;
  padding: 25px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
#errorTitle {
  font-size: 18px; font-weight: bold; color: #333; margin-bottom: 15px;
}
#errorMessage {
  font-size: 15px; color: #666; margin-bottom: 25px; line-height: 1.5;
}
.error-actions {
  display: flex; gap: 12px; justify-content: center;
}
.error-btn {
  padding: 12px 30px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
#errorAutorizar {
  background: #e74c3c;
  color: white;
}
#errorOK {
  background: #9E3667;
  color: white;
}
#errorAutorizar:hover { background: #c0392b; }
#errorOK:hover { background: #8a2e5a; }
</style>
</head>
<body>

<div class="left" id="items"></div>

<div class="right">
  <div>
    <div class="valor-faltante">
      <h2>VALOR FALTANTE</h2>
      <div class="valor">R$ <span id="valorFaltante">0</span></div>
      <div id="descontoArea">
        <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
      </div>
    </div>
    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    SUBTOTAL: R$ <span id="subtotal">0</span><br>
    TOTAL: R$ <span id="total">0</span>
  </div>
  <div class="footer-right" style="display:flex; justify-content:flex-end; align-items:center;">
    <button class="finish" onclick="finalizar()">Finalizar Venda</button>
  </div>
</div>

<!-- Overlays -->
<div class="overlay" id="cardScreen">
  <img src="loading.gif" class="loading">
  <h1 id="cardMessage">APROXIME, INSIRA OU PASSE O CARTÃO</h1>
  <div class="box">
    <p>💳 Cartão</p>
    <p>Valor: R$ <span id="cardTotal"></span></p>
    <small>Ambiente de teste</small>
  </div>
</div>

<div class="overlay" id="pixScreen">
  <h1 id="pixMessage">CONSULTANDO STATUS DA TRANSAÇÃO VIA PIX</h1>
  <img src="qrcode.avif" class="qr">
  <div class="box">
    <p>📲 PIX</p>
    <p>Valor: R$ <span id="pixTotal"></span></p>
    <small>Ambiente de teste</small>
  </div>
</div>

<!-- Modais -->
<div class="modal" id="modalTipo">
  <div class="modal-box">
    <div class="modal-header">
      <span>Tipo de desconto</span>
      <span class="modal-close" onclick="fecharModal()">✕</span>
    </div>
    <div class="option" onclick="abrirInput('percent')">(%) Percentual</div>
    <div class="option" onclick="abrirInput('valor')">(R$) Valor</div>
  </div>
</div>

<div class="modal" id="modalInput">
  <div class="modal-box">
    <div class="modal-close" onclick="fecharModal()">✕</div>
    <h2 id="display">0</h2>
    <p id="label"></p>
    <div class="keypad">
      <button class="key" onclick="dig(1)">1</button>
      <button class="key" onclick="dig(2)">2</button>
      <button class="key" onclick="dig(3)">3</button>
      <button class="key" onclick="dig(4)">4</button>
      <button class="key" onclick="dig(5)">5</button>
      <button class="key" onclick="dig(6)">6</button>
      <button class="key" onclick="dig(7)">7</button>
      <button class="key" onclick="dig(8)">8</button>
      <button class="key" onclick="dig(9)">9</button>
      <button class="key" onclick="clearInput()">C</button>
      <button class="key" onclick="dig(0)">0</button>
      <button class="key" onclick="del()">⌫</button>
    </div>
    <div class="actions">
      <button class="btn-red" onclick="cancelarInput()">Cancelar</button>
      <button class="btn-green" onclick="validarEDescontar()">Avançar</button>
    </div>
  </div>
</div>

<!-- Modal de Limite de Desconto -->
<div id="errorModal">
  <div id="errorBox">
    <div id="errorTitle">AUTORIZAR</div>
    <div id="errorMessage"></div>
    <div class="error-actions">
      <button id="errorAutorizar" class="error-btn">Autorizar</button>
      <button id="errorOK" class="error-btn" onclick="fecharErroERetornar()">OK</button>
    </div>
  </div>
</div>

<script>
/* ======================= DADOS ======================= */
const cart = JSON.parse(localStorage.getItem('cart')) || {};
const serviceFeeEnabled = JSON.parse(localStorage.getItem('serviceFeeEnabled')) || false;
const itemsDiv = document.getElementById('items');
const subtotalSpan = document.getElementById('subtotal');
const totalSpan = document.getElementById('total');
const valorFaltanteSpan = document.getElementById('valorFaltante');
const cardTotal = document.getElementById('cardTotal');
const pixTotal = document.getElementById('pixTotal');

let total = 0;
Object.keys(cart).forEach(name => {
  const item = cart[name];
  const itemTotal = item.qty * item.price;
  total += itemTotal;
  itemsDiv.innerHTML += `
    <div class="item">
      <div class="item-left">
        <img src="${item.img}" class="item-img">
        <div>
          <div class="item-name">${name}</div>
          <div class="item-qty">x${item.qty}</div>
        </div>
      </div>
      <div>R$ ${itemTotal.toFixed(2)}</div>
    </div>
  `;
});

/* ======================= DESCONTO ======================= */
let desconto = 0;
let tipo = null;
let input = "";
const LIMITE_PERCENTUAL = 10;

function baseTotal(){
  return serviceFeeEnabled ? total * 1.10 : total;
}

function calcFinal(){
  let base = baseTotal();
  if(tipo === "percent") return base - (base * desconto / 100);
  if(tipo === "valor") return base - desconto;
  return base;
}

function atualizarTotais(){
  const final = calcFinal();
  subtotalSpan.innerText = total.toFixed(2);
  totalSpan.innerText = final.toFixed(2);
  valorFaltanteSpan.innerText = final.toFixed(2);
  cardTotal.innerText = final.toFixed(2);
  pixTotal.innerText = final.toFixed(2);
}

/* ======================= PAGAMENTO ======================= */
let paymentMethod = null;
function selectPayment(method, btn) {
  paymentMethod = method;
  document.querySelectorAll('.pay-buttons button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function finalizar() {
  if (!paymentMethod) {
    alert("Selecione uma forma de pagamento!");
    return;
  }
  if (paymentMethod === "Cartao") simularCartao();
  else if (paymentMethod === "PIX") simularPix();
  else {
    alert("Pagamento em dinheiro recebido");
    finalizarVenda();
  }
}

function simularCartao() {
  const screen = document.getElementById('cardScreen');
  const msg = document.getElementById('cardMessage');
  screen.style.display = "flex";
  msg.innerText = "APROXIME, INSIRA OU PASSE O CARTÃO";
  setTimeout(() => msg.innerText = "PROCESSANDO...", 2000);
  setTimeout(() => msg.innerText = "DÉBITO NUBANK", 4000);
  setTimeout(() => msg.innerText = "TRANSAÇÃO APROVADA ✅", 8000);
  setTimeout(finalizarVenda, 10000);
}

function simularPix() {
  const screen = document.getElementById('pixScreen');
  const msg = document.getElementById('pixMessage');
  screen.style.display = "flex";
  msg.innerText = "CONSULTANDO STATUS DA TRANSAÇÃO VIA PIX";
  setTimeout(() => msg.innerText = "TRANSAÇÃO APROVADA ✅", 5000);
  setTimeout(finalizarVenda, 7000);
}

function finalizarVenda() {
  localStorage.removeItem('cart');
  window.location.href = "carrinho.html";
}

/* ======================= MODAIS ======================= */
function abrirTipoDesconto(){
  if (tipo !== null) return;   // impede reabrir se já tem desconto aplicado
  document.getElementById('modalTipo').style.display = "flex";
}

function abrirInput(t){
  tipo = t;
  input = "";
  document.getElementById('modalTipo').style.display = "none";
  document.getElementById('modalInput').style.display = "flex";
  document.getElementById('label').innerText = t==="percent" ? "PERCENTUAL (%)" : "VALOR (R$)";
  atualizarDisplay();
}

function fecharModal(){
  document.querySelectorAll('.modal').forEach(m => m.style.display = "none");
}

/* Nova função: Cancelar o input e resetar tudo */
function cancelarInput(){
  tipo = null;        // ← IMPORTANTE: reseta o tipo
  input = "";
  fecharModal();
}

/* ======================= VALIDAÇÃO PRINCIPAL ======================= */
function validarEDescontar(){
  const base = baseTotal();
  let valorDigitado = parseFloat(input) || 0;

  if (tipo === "percent") {
    if (valorDigitado <= 0 || valorDigitado >= 100) {
      mostrarModalErro("Valor inválido para o desconto");
      return;
    }
    if (valorDigitado > LIMITE_PERCENTUAL) {
      mostrarModalLimite(`Não é possivel adicionar o desconto.<br>O limite de desconto é de ${LIMITE_PERCENTUAL}%`);
      return;
    }
    desconto = valorDigitado;
  }
  else { // Valor em R$
    const valorDesconto = valorDigitado / 100;
    const limiteEmReais = base * (LIMITE_PERCENTUAL / 100);

    if (valorDesconto <= 0 || valorDesconto >= base) {
      mostrarModalErro("Valor inválido para o desconto");
      return;
    }
    if (valorDesconto > limiteEmReais) {
      mostrarModalLimite(`Não é possivel adicionar o desconto.<br>O limite de desconto é de R$ ${limiteEmReais.toFixed(2)}`);
      return;
    }
    desconto = valorDesconto;
  }

  // Desconto válido
  fecharModal();
  atualizarTotais();
  atualizarBotaoDesconto();
}

/* Modal de erro antigo (0 ou >= total) */
function mostrarModalErro(mensagem) {
  document.getElementById('errorTitle').innerText = "EYE WEB";
  document.getElementById('errorMessage').innerHTML = mensagem;
  document.getElementById('errorAutorizar').style.display = "none";
  document.getElementById('errorOK').onclick = fecharErroERetornar;
  document.getElementById('errorModal').style.display = "flex";
}

/* Modal de limite 10% */
function mostrarModalLimite(mensagem) {
  document.getElementById('errorTitle').innerText = "AUTORIZAR";
  document.getElementById('errorMessage').innerHTML = mensagem;
  document.getElementById('errorAutorizar').style.display = "inline-block";
  document.getElementById('errorOK').onclick = fecharErroERetornar;
  document.getElementById('errorModal').style.display = "flex";
}

function fecharErroERetornar() {
  document.getElementById('errorModal').style.display = "none";
}

/* ======================= ATUALIZAR BOTÃO ======================= */
function atualizarBotaoDesconto() {
  const area = document.getElementById('descontoArea');
  let texto = tipo === "percent" 
    ? `APLICADO DESCONTO DE ${desconto}%` 
    : `APLICADO DESCONTO DE R$ ${desconto.toFixed(2)}`;

  area.innerHTML = `
    <button class="btn-desconto" disabled>${texto}</button>
    <button class="btn-remove" onclick="removerDesconto()">✕</button>
  `;
}

function removerDesconto(){
  desconto = 0;
  tipo = null;
  input = "";
  document.getElementById('descontoArea').innerHTML =
    `<button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>`;
  atualizarTotais();
}

/* ======================= KEYPAD ======================= */
function dig(n){ input += n; atualizarDisplay(); }
function del(){ input = input.slice(0,-1); atualizarDisplay(); }
function clearInput(){ input = ""; atualizarDisplay(); }

function atualizarDisplay(){
  document.getElementById('display').innerText =
    tipo === "percent" 
      ? (input || "0") + "%" 
      : "R$ " + ((parseFloat(input)||0)/100).toFixed(2);
}

/* INIT */
atualizarTotais();
</script>
</body>
</html>
