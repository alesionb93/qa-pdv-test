<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

/* LEFT */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.item-left {
  display: flex;
  gap: 10px;
}

.item-img {
  width: 45px;
  height: 45px;
}

/* RIGHT */
.right {
  flex: 1;
  background: #FFE6EF;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.valor {
  font-size: 40px;
  font-weight: bold;
}

/* BOTÕES */
.btn-desconto {
  background: #2196f3;
  color: white;
  padding: 10px;
  border: none;
}

.btn-remove {
  background: red;
  color: white;
  border-radius: 50%;
  width: 30px;
}

.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  background: #9E3667;
  color: white;
  border: none;
}

.finish {
  background: #22B14C;
  color: white;
  padding: 15px;
  border: none;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #FFE6EF;
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

/* MODAL */
.modal {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box {
  background:white;
  padding:20px;
}

.keypad button {
  width:60px;
  height:50px;
  margin:5px;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">
  <div>

    <h2>VALOR FALTANTE</h2>
    <div class="valor">R$ <span id="valorFaltante">0</span></div>

    <div id="descontoArea">
      <button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>
    </div>

    <div class="pay-buttons">
      <button onclick="selectPayment('Dinheiro', this)">Dinheiro</button>
      <button onclick="selectPayment('Cartao', this)">Cartão</button>
      <button onclick="selectPayment('PIX', this)">PIX</button>
    </div>
  </div>
</div>

<div class="footer">
  <div>
    SUBTOTAL: R$ <span id="subtotal">0</span><br>
    TOTAL: R$ <span id="total">0</span>
  </div>

  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<!-- MODAIS -->
<div class="modal" id="modalTipo">
  <div class="modal-box">
    <h3>Tipo de desconto</h3>
    <button onclick="abrirInput('percent')">(%) Percentual</button>
    <button onclick="abrirInput('valor')">(R$) Valor</button><br><br>
    <button onclick="fecharModal()">X</button>
  </div>
</div>

<div class="modal" id="modalInput">
  <div class="modal-box">
    <h2 id="display">0</h2>

    <div class="keypad">
      <button onclick="dig(1)">1</button>
      <button onclick="dig(2)">2</button>
      <button onclick="dig(3)">3</button><br>
      <button onclick="dig(4)">4</button>
      <button onclick="dig(5)">5</button>
      <button onclick="dig(6)">6</button><br>
      <button onclick="dig(7)">7</button>
      <button onclick="dig(8)">8</button>
      <button onclick="dig(9)">9</button><br>
      <button onclick="clearInput()">LIMPAR</button>
      <button onclick="dig(0)">0</button>
      <button onclick="del()">X</button>
    </div>

    <br>
    <button onclick="fecharModal()">Cancelar</button>
    <button onclick="aplicarDesconto()">Avançar</button>
  </div>
</div>

<script>

const cart = JSON.parse(localStorage.getItem('cart')) || {};
const serviceFeeEnabled = JSON.parse(localStorage.getItem('serviceFeeEnabled')) || false;

const itemsDiv = document.getElementById('items');
const subtotalSpan = document.getElementById('subtotal');
const totalSpan = document.getElementById('total');
const valorFaltanteSpan = document.getElementById('valorFaltante');

let total = 0;

/* ✅ RESTAURADO */
Object.keys(cart).forEach(name => {
  const item = cart[name];
  const itemTotal = item.qty * item.price;
  total += itemTotal;

  itemsDiv.innerHTML += `
    <div class="item">
      <div class="item-left">
        <img src="${item.img}" class="item-img">
        <div>
          <div>${name}</div>
          <div>x${item.qty}</div>
        </div>
      </div>
      <div>R$ ${itemTotal}</div>
    </div>
  `;
});

/* DESCONTO */
let desconto = 0;
let tipo = null;
let input = "";

function calcularBase(){
  return serviceFeeEnabled ? total * 1.10 : total;
}

function atualizarTotais(){
  let base = calcularBase();
  let final = base;

  if(tipo==="percent") final -= base*(desconto/100);
  if(tipo==="valor") final -= desconto;

  subtotalSpan.innerText = total.toFixed(2);
  totalSpan.innerText = final.toFixed(2);
  valorFaltanteSpan.innerText = final.toFixed(2);
}

function abrirTipoDesconto(){
  document.getElementById('modalTipo').style.display="flex";
}

function abrirInput(t){
  tipo=t;
  input="";
  fecharModal();
  document.getElementById('modalInput').style.display="flex";
}

function fecharModal(){
  document.querySelectorAll('.modal').forEach(m=>m.style.display="none");
}

function dig(n){ input+=n; updateDisplay(); }
function del(){ input=input.slice(0,-1); updateDisplay(); }
function clearInput(){ input=""; updateDisplay(); }

function updateDisplay(){
  document.getElementById('display').innerText = input || "0";
}

function aplicarDesconto(){
  if(!input) return;

  if(tipo==="percent") desconto=parseFloat(input);
  else desconto=parseFloat(input)/100;

  fecharModal();
  atualizarTotais();

  document.getElementById('descontoArea').innerHTML =
    `<button disabled>Desconto aplicado</button>
     <button onclick="removerDesconto()">X</button>`;
}

function removerDesconto(){
  desconto=0; tipo=null;
  document.getElementById('descontoArea').innerHTML =
    `<button class="btn-desconto" onclick="abrirTipoDesconto()">APLICAR DESCONTO</button>`;
  atualizarTotais();
}

/* PAGAMENTO (RESTAURADO) */
let paymentMethod=null;

function selectPayment(method, btn){
  paymentMethod=method;
}

function finalizar(){
  if(!paymentMethod){
    alert("Selecione uma forma de pagamento!");
    return;
  }
  alert("Venda finalizada!");
}

atualizarTotais();

</script>

</body>
</html>
