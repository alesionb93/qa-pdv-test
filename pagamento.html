<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  height: 100vh;
}

/* LADO ESQUERDO */
.left {
  flex: 2;
  background: white;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.item-name {
  font-weight: bold;
}

.item-price {
  color: #555;
}

/* LADO DIREITO */
.right {
  flex: 1;
  background: #fafafa;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* TOTAL */
.total {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* BOTÕES */
.pay-buttons button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.btn-cash { background: #4caf50; color: white; }
.btn-card { background: #2196f3; color: white; }
.btn-pix { background: #9c27b0; color: white; }

.finish {
  background: #9E3667;
  color: white;
  padding: 18px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="left" id="items"></div>

<div class="right">
  <div>
    <div class="total">
      Total: R$ <span id="total">0</span>
    </div>

    <div class="pay-buttons">
      <button class="btn-cash">Dinheiro</button>
      <button class="btn-card">Cartão</button>
      <button class="btn-pix">PIX</button>
    </div>
  </div>

  <button class="finish" onclick="finalizar()">Finalizar Venda</button>
</div>

<script>
// 🔥 PEGAR DADOS DO CARRINHO
const cart = JSON.parse(localStorage.getItem('cart')) || {};

const itemsDiv = document.getElementById('items');
const totalSpan = document.getElementById('total');

let total = 0;

Object.keys(cart).forEach(name => {
  const item = cart[name];
  const itemTotal = item.qty * item.price;
  total += itemTotal;

  itemsDiv.innerHTML += `
    <div class="item">
      <div>
        <div class="item-name">${name} x${item.qty}</div>
      </div>
      <div class="item-price">R$ ${itemTotal}</div>
    </div>
  `;
});

totalSpan.innerText = total;

// FINALIZAR
function finalizar() {
  alert("Venda finalizada 🚀");
  localStorage.removeItem('cart');
  window.location.href = "index.html";
}
</script>

</body>
</html>
